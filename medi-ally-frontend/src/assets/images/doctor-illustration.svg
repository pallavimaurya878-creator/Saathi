<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="20"/>
  <!-- Doctor body -->
  <circle cx="200" cy="100" r="35" fill="#2563EB" opacity="0.1"/>
  <circle cx="200" cy="90" r="28" fill="#2563EB" opacity="0.15"/>
  <!-- Stethoscope -->
  <path d="M185 115 Q170 140 175 160 Q180 180 200 180 Q220 180 225 160 Q230 140 215 115" stroke="#2563EB" stroke-width="3" fill="none"/>
  <circle cx="200" cy="185" r="8" fill="#10B981"/>
  <!-- Cross -->
  <rect x="193" y="60" width="14" height="40" rx="3" fill="#2563EB"/>
  <rect x="183" y="72" width="34" height="14" rx="3" fill="#2563EB"/>
  <!-- Heartbeat line -->
  <path d="M50 230 L120 230 L140 210 L155 250 L170 200 L185 240 L200 230 L350 230" stroke="#EF4444" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="200" y="275" text-anchor="middle" font-family="system-ui" font-size="14" fill="#64748B">Your AI Health Companion</text>
</svg>
